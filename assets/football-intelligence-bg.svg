<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Football intelligence field background</title>
  <desc id="desc">A dark football field with tactical route lines and data points.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02050b"/>
      <stop offset="0.46" stop-color="#06162e"/>
      <stop offset="1" stop-color="#0a2f5f"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#02050b"/>
      <stop offset="0.38" stop-color="#07182e"/>
      <stop offset="1" stop-color="#123d3d"/>
    </linearGradient>
    <radialGradient id="light" cx="78%" cy="18%" r="58%">
      <stop offset="0" stop-color="#6bd7ff" stop-opacity="0.44"/>
      <stop offset="0.34" stop-color="#0c63ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0c63ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#light)"/>
